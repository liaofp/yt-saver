name: YouTube-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: true
      download_type:
        default: 'audio'
        type: choice
        options: [video, audio]
      storage_provider:
        default: 'aliyun'
      provider_token:
        description: 'Aliyun Drive Refresh Token'
        required: false
      ali_path:
        description: 'Aliyun Drive storage path'
        default: '/'
        required: false
      output_filename:
        description: 'Custom output filename (pure name, no extension)'
        default: ''
        required: false

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner

    steps:
      - name: 1. Checkout code & strengthen environment
        uses: actions/checkout@v4

      - name: 2. Install dependencies (force-update yt-dlp)
        run: |
          sudo python3 -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs jq

      - name: 3. Execute decryption download
        run: |
          COOKIE_CONTENT="${{ secrets.YOUTUBE_COOKIES }}"
          if [ -z "$COOKIE_CONTENT" ]; then
            echo "❌ Error: YOUTUBE_COOKIES secret is empty or not set."
            echo "Please run 'python3 utils.py' locally to generate cookies.txt, then sync it to GitHub Secrets:"
            echo "  gh secret set YOUTUBE_COOKIES < cookies.txt"
            exit 1
          fi
          echo "$COOKIE_CONTENT" > cookies.txt

          # Enhanced anti-bot args: mimic a real browser to avoid 403 from YouTube
          # Note: --extractor-args values must be quoted carefully for bash arrays
          BASE_ARGS=(
            --cookies cookies.txt
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
            --add-header "Accept-Language:en-US,en;q=0.9"
            --no-check-certificates
            --retries 10
            --fragment-retries 10
          )

          # Generate timestamp first so the same value is used before and after download
          TIMESTAMP_MS=$(date +%s%3N)

          # Determine whether a custom filename is used
          if [ -n "${{ github.event.inputs.output_filename }}" ]; then
            # User specified a filename: use it directly without appending timestamp;
            # yt-dlp will append the correct extension automatically
            OUTPUT_TEMPLATE="${{ github.event.inputs.output_filename }}.%(ext)s"
            FILE_PREFIX="${{ github.event.inputs.output_filename }}"
          else
            # No filename specified: use timestamp as filename
            OUTPUT_TEMPLATE="${TIMESTAMP_MS}.%(ext)s"
            FILE_PREFIX="${TIMESTAMP_MS}"
          fi

          if [ "${{ github.event.inputs.download_type }}" = "audio" ]; then
            # Try android client first (less 403-prone), fallback to web client
            yt-dlp "${BASE_ARGS[@]}" --extractor-args "youtube:player_client=android" -f "bestaudio[ext=webm]/bestaudio[ext=m4a]/bestaudio" --extract-audio --audio-format opus "${{ github.event.inputs.video_url }}" -o "$OUTPUT_TEMPLATE" || \
            yt-dlp "${BASE_ARGS[@]}" --extractor-args "youtube:player_client=web" -f "bestaudio[ext=webm]/bestaudio[ext=m4a]/bestaudio" --extract-audio --audio-format opus "${{ github.event.inputs.video_url }}" -o "$OUTPUT_TEMPLATE"
          else
            yt-dlp "${BASE_ARGS[@]}" --extractor-args "youtube:player_client=android" -f "best[height<=720][ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUTPUT_TEMPLATE" || \
            yt-dlp "${BASE_ARGS[@]}" --extractor-args "youtube:player_client=web" -f "best[height<=720][ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUTPUT_TEMPLATE"
          fi

          # Locate the actually downloaded file (match filename prefix)
          FINAL_FILE=$(ls -t ${FILE_PREFIX}.* 2>/dev/null | head -n 1)

          if [ -z "$FINAL_FILE" ]; then
            echo "❌ Error: yt-dlp download failed, no output file found"
            exit 1
          fi
          echo "FINAL_FILE=$FINAL_FILE" >> $GITHUB_ENV

      - name: 4. Dynamic plugin upload
        env:
          TOKEN: ${{ github.event.inputs.storage_provider == 'aliyun' && github.event.inputs.provider_token || secrets.ONEDRIVE_TOKEN }}
          PROVIDER: ${{ github.event.inputs.storage_provider }}
          PYTHONUNBUFFERED: "1"
        run: |
          chmod +x ./providers/${PROVIDER}.sh
          # ./providers/${PROVIDER}.sh "$FINAL_FILE" "$TOKEN"
          ./providers/${PROVIDER}.sh "$FINAL_FILE" || echo "Upload task timed out"

      - name: 5. Automatic GitHub space cleanup
        if: always()
        run: |
          echo "[*] Performing secure cleanup..."
          rm -f cookies.txt          # Delete cookie containing account credentials
          rm -f "${{ env.FINAL_FILE }}" 2>/dev/null || true  # Delete downloaded media file
          rm -rf ./*.part            # Delete possible download caches
          echo "✅ Data cleaned, no residue left."
