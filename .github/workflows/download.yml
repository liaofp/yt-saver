name: YouTube-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: true
      download_type:
        default: 'audio'
        type: choice
        options: [video, audio]
      storage_provider:
        default: 'aliyun'
      provider_token:
        description: '阿里云盘 Refresh Token'
        required: false
      ali_path:
        description: '阿里云盘存储路径'
        default: '/'
        required: false        

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 代码检出与环境强化
        uses: actions/checkout@v4

      - name: 2. 安装依赖 (强制更新 yt-dlp)
        run: |
          sudo python3 -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs jq

      - name: 3. 执行解密下载
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          
          # 严格对齐附件的成功参数
          COMMON_ARGS="--cookies cookies.txt --remote-components ejs:github --js-runtimes node --no-check-certificates --force-ipv4"
          
          if [ "${{ github.event.inputs.download_type }}" = "audio" ]; then
            yt-dlp $COMMON_ARGS -f "bestaudio" --extract-audio --audio-format opus "${{ github.event.inputs.video_url }}" -o "output.%(ext)s"
          else
            yt-dlp $COMMON_ARGS -f "best[height<=720][ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "output.%(ext)s"
          fi
          
          echo "FINAL_FILE=$(ls output.* | head -n 1)" >> $GITHUB_ENV

      - name: 4. 动态插件上传
        env:
          TOKEN: ${{ github.event.inputs.storage_provider == 'aliyun' && github.event.inputs.provider_token || secrets.ONEDRIVE_TOKEN }}
          PROVIDER: ${{ github.event.inputs.storage_provider }}
          PYTHONUNBUFFERED: "1"
        run: |
          chmod +x ./providers/${PROVIDER}.sh
          # ./providers/${PROVIDER}.sh "$FINAL_FILE" "$TOKEN"
          ./providers/${PROVIDER}.sh "$FINAL_FILE" || echo "上传任务超时"

      - name: 5. 自动清理 GitHub 空间
        if: always() 
        run: |
          echo "[*] 正在执行安全清理..."
          rm -f cookies.txt          # 删除包含账号凭证的 Cookie [cite: 9, 42]
          rm -f output.* # 删除下载的媒体文件 [cite: 43]
          rm -rf ./*.part            # 删除可能的下载缓存
          echo "✅ 数据已清理，无残留。"