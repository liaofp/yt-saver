name: YouTube-Expert-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '请输入 YouTube 视频完整 URL'
        required: true

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 安装环境 (yt-dlp + ffmpeg + Node.js)
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs  # Node.js 用于解析 YouTube JS 加密

      - name: 3. 注入验证凭据
        run: |
          # 从 GitHub Secrets 中读取 Cookies 并生成本地文件
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: 4. 执行极速下载
        run: |
          echo "正在解析并下载最高画质 (1080p MP4)..."
          # --force-ipv4 往往能避开一些 IPv6 的频率限制
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --cookies cookies.txt \
                 --force-ipv4 \
                 --no-check-certificates \
                 "${{ github.event.inputs.video_url }}" -o "video.mp4"
          
          if [ ! -f "video.mp4" ]; then echo "下载失败！"; exit 1; fi

      - name: 5. 上传至 GoFile (外部高速链接)
        id: gofile
        continue-on-error: true # 即使 GoFile 挂了，也不影响后续备份
        run: |
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          RESPONSE=$(curl -F "file=@video.mp4" "https://${SERVER}.gofile.io/contents/uploadfile")
          LINK=$(echo $RESPONSE | jq -r '.data.downloadPage')
          echo "GOFILE_LINK=$LINK" >> $GITHUB_ENV
          echo "-------------------------------------------"
          echo "GoFile 下载地址: $LINK"
          echo "-------------------------------------------"

      - name: 6. 备份方案：上传至 GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-backup
          path: video.mp4
          retention-days: 1 # 仅保留1天，节省空间

      - name: 7. 清理敏感数据
        if: always()
        run: rm -f cookies.txt video.mp4
