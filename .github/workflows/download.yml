name: YouTube-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频 URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境加固
        run: |
          sudo python3 -m pip install -U yt-dlp
          # 安装完整 Node.js 环境，这是解决 n-challenge 的硬件要求
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs

      - name: 2. 绕过验证并下载 (720p 专攻)
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          
          # 参数解析：
          # -f 22: 22 是 YouTube 固定的 720p MP4 (带声音) 的单文件编号，成功率最高
          # --no-video-multistreams: 强制不合并，直接抓取成品文件
          # --cookies: 必须配合有效的 Cookies
          yt-dlp -f "22/best[height<=720][ext=mp4]" \
                 --cookies cookies.txt \
                 --no-check-certificates \
                 --force-ipv4 \
                 --geo-bypass \
                 "${{ github.event.inputs.video_url }}" -o "video.mp4"
          
          if [ ! -f "video.mp4" ]; then echo "下载失败！"; exit 1; fi

      - name: 3. 上传至 GoFile
        run: |
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          RESPONSE=$(curl -F "file=@video.mp4" "https://${SERVER}.gofile.io/contents/uploadfile")
          echo "-------------------------------------------"
          echo "🚀 720p 视频链接: $(echo $RESPONSE | jq -r '.data.downloadPage')"
          echo "-------------------------------------------"

      - name: 4. 彻底物理粉碎
        if: always()
        run: rm -rf *