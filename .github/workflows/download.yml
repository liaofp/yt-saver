name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube \u89c6\u9891\u94fe\u63a5'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          # \u66f4\u65b0 yt-dlp \u5e76\u5b89\u88c5\u5fc5\u8981\u5de5\u5177
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # GitHub Runner \u81ea\u5e26 jq\uff0c\u65e0\u9700\u91cd\u590d\u5b89\u88c5

      - name: Download Video
        run: |
          echo "\u5f00\u59cb\u4e0b\u8f7d\u89c6\u9891..."
          # \u5173\u952e\u70b9\uff1a\u6dfb\u52a0 --user-agent \u548c --no-check-certificates \u63d0\u9ad8\u6210\u529f\u7387
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --no-check-certificates \
                 "${{ github.event.inputs.video_url }}" -o "video.mp4"
          
          # \u68c0\u67e5\u6587\u4ef6\u662f\u5426\u771f\u7684\u4e0b\u8f7d\u6210\u529f
          if [ ! -f "video.mp4" ]; then
            echo "\u9519\u8bef: \u89c6\u9891\u4e0b\u8f7d\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5 URL \u6216\u662f\u5426\u88ab YouTube \u5c4f\u853d\u3002"
            exit 1
          fi

      - name: Upload to GoFile
        id: upload_gofile
        run: |
          echo "\u6b63\u5728\u83b7\u53d6 GoFile \u670d\u52a1\u5668..."
          # \u589e\u52a0\u91cd\u8bd5\u903b\u8f91
          SERVER_DATA=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_DATA | jq -r '.data.servers[0].name // empty')
          
          if [ -z "$SERVER" ]; then
            echo "\u65e0\u6cd5\u83b7\u53d6 GoFile \u670d\u52a1\u5668\uff0c\u5c1d\u8bd5\u5907\u7528\u65b9\u6848..."
            SERVER="store1" 
          fi
          
          echo "\u6b63\u5728\u4e0a\u4f20\u81f3\u670d\u52a1\u5668: $SERVER..."
          # \u4f7f\u7528\u66f4\u52a0\u5065\u58ee\u7684\u4e0a\u4f20\u547d\u4ee4
          RESPONSE=$(curl -F "file=@video.mp4" "https://${SERVER}.gofile.io/contents/uploadfile")
          
          # \u63d0\u53d6\u4e0b\u8f7d\u9875
          DOWNLOAD_PAGE=$(echo $RESPONSE | jq -r '.data.downloadPage')
          
          if [ "$DOWNLOAD_PAGE" != "null" ]; then
            echo "::notice title=Download Link::$DOWNLOAD_PAGE"
            echo "-------------------------------------------"
            echo "\u4e0b\u8f7d\u5730\u5740: $DOWNLOAD_PAGE"
            echo "-------------------------------------------"
          else
            echo "\u4e0a\u4f20\u5931\u8d25\uff0cAPI \u8fd4\u56de\u7ed3\u679c: $RESPONSE"
            exit 1
          fi

      - name: GitHub Artifacts Backup
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: video-backup
          path: video.mp4
          retention-days: 1
