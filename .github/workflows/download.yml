name: YouTube-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频 URL'
        required: true
      download_type:
        description: '下载类型：video 或 audio'
        required: false
        default: 'audio'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境强化与补丁加载
        run: |
          # 强制更新到开发版或最新版，以获取最新的解密支持
          sudo python3 -m pip install -U yt-dlp requests playwright
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs
          
      - name: 2. 安装 Playwright 浏览器
        run: |
          playwright install chromium
          
      - name: 3. 执行解密下载
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

          if [ "${{ github.event.inputs.download_type }}" = "audio" ]; then
            yt-dlp -f "bestaudio" \
                   --cookies cookies.txt \
                   --remote-components ejs:github \
                   --js-runtimes node \
                   --no-check-certificates \
                   --force-ipv4 \
                   "${{ github.event.inputs.video_url }}" -o "audio.%(ext)s"

            INPUT_FILE=$(ls audio.* 2>/dev/null | head -n1)
            if [ -z "$INPUT_FILE" ] || [ ! -f "$INPUT_FILE" ]; then
              echo "下载失败"
              exit 1
            fi

            ffmpeg -y -i "$INPUT_FILE" -c:a libopus -b:a 64k -ac 1 "audio.opus"
            rm -f "$INPUT_FILE"
            if [ ! -f "audio.opus" ]; then
              echo "转码失败"
              exit 1
            fi
          else
            yt-dlp -f "22/best[height<=720][ext=mp4]/best" \
                   --cookies cookies.txt \
                   --remote-components ejs:github \
                   --js-runtimes node \
                   --no-check-certificates \
                   --force-ipv4 \
                   "${{ github.event.inputs.video_url }}" -o "video.mp4"

            if [ ! -f "video.mp4" ]; then
              echo "下载失败"
              exit 1
            fi
          fi

      - name: 4. 上传 Aliyun Drive 并回传参数
        run: |
          if [ "${{ github.event.inputs.download_type }}" = "audio" ]; then
            UPLOAD_FILE="audio.opus"
          else
            UPLOAD_FILE="video.mp4"
          fi

          python3 aliyundrive_upload.py \
            --input "$UPLOAD_FILE" \
            --refresh-token "${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}"

          # 清理临时文件
          rm -fr *
        run: |
          if [ "${{ github.event.inputs.download_type }}" = "audio" ]; then
            UPLOAD_FILE="audio.opus"
          else
            UPLOAD_FILE="video.mp4"
          fi

          python3 aliyundrive_upload.py \
            --input "$UPLOAD_FILE" \
            --refresh-token "${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}"

          # 清理临时文件
          rm -fr *
