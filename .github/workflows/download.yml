name: YouTube-Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频 URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境强化与补丁加载
        run: |
          # 强制更新到开发版或最新版，以获取最新的解密支持
          sudo python3 -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs
          
      - name: 2. 执行解密下载
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          
          # 核心改动：
          # 1. --remote-components ejs:github -> 强制下载解密脚本
          # 2. --allow-unplayable-formats -> 绕过某些初始限制
          # 3. --js-runtimes node -> 明确指定
          yt-dlp -f "22/best[height<=720][ext=mp4]/best" \
                 --cookies cookies.txt \
                 --remote-components ejs:github \
                 --js-runtimes node \
                 --no-check-certificates \
                 --force-ipv4 \
                 "${{ github.event.inputs.video_url }}" -o "video.mp4"
          
          if [ ! -f "video.mp4" ]; then echo "下载失败"; exit 1; fi

      - name: 3. 上传 GoFile 并粉碎本地记录
        run: |
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          RESPONSE=$(curl -F "file=@video.mp4" "https://${SERVER}.gofile.io/contents/uploadfile")
          echo "-------------------------------------------"
          echo "🚀 下载地址: $(echo $RESPONSE | jq -r '.data.downloadPage')"
          echo "-------------------------------------------"
          # 阅后即焚
          #rm -f video.mp4 cookies.txt
          rm -fr *