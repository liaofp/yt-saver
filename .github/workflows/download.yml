name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频链接'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          # 更新 yt-dlp 并安装必要工具
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # GitHub Runner 自带 jq，无需重复安装

      - name: Download Video
        run: |
          echo "开始下载视频..."
          # 关键点：添加 --user-agent 和 --no-check-certificates 提高成功率
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --no-check-certificates \
                 "${{ github.event.inputs.video_url }}" -o "video.mp4"
          
          # 检查文件是否真的下载成功
          if [ ! -f "video.mp4" ]; then
            echo "错误: 视频下载失败，请检查 URL 或是否被 YouTube 屏蔽。"
            exit 1
          fi

      - name: Upload to GoFile
        id: upload_gofile
        run: |
          echo "正在获取 GoFile 服务器..."
          # 增加重试逻辑
          SERVER_DATA=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_DATA | jq -r '.data.servers[0].name // empty')
          
          if [ -z "$SERVER" ]; then
            echo "无法获取 GoFile 服务器，尝试备用方案..."
            SERVER="store1" 
          fi
          
          echo "正在上传至服务器: $SERVER..."
          # 使用更加健壮的上传命令
          RESPONSE=$(curl -F "file=@video.mp4" "https://${SERVER}.gofile.io/contents/uploadfile")
          
          # 提取下载页
          DOWNLOAD_PAGE=$(echo $RESPONSE | jq -r '.data.downloadPage')
          
          if [ "$DOWNLOAD_PAGE" != "null" ]; then
            echo "::notice title=Download Link::$DOWNLOAD_PAGE"
            echo "-------------------------------------------"
            echo "下载地址: $DOWNLOAD_PAGE"
            echo "-------------------------------------------"
          else
            echo "上传失败，API 返回结果: $RESPONSE"
            exit 1
          fi

      - name: GitHub Artifacts Backup
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: video-backup
          path: video.mp4
          retention-days: 1
